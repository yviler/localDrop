<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{{ directory.name }}</title>
  </head>
  <body>
    <h1>
      Directory <b>{{ directory.name }}</b> with {{ directory.item_amount }}
      amount of items
    </h1>
    <h2>Items</h2>
    <table>
      <th>No.</th>
      <th>Filename</th>
      <th>Filesize</th>
      <th>Filetype</th>
      {% for item in items %}
      <tr>
        <td></td>
        <td>
          {% if item.isDirectory %}
          <!-- make current_diretory cleaner for accessing directories-->
          <a
            href="{{request.url_for('browse', current_directory=directory.name + '/' + item.filename)}}"
            >{{ item.filename }}</a
          >{% else %} {{ item.filename }} {% endif %}
        </td>
        <td>{{ item.filesize }}</td>
        <td>{{ item.filetype }}</td>
      </tr>
      {% endfor %}
    </table>
  </body>
</html>
