<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{{ directory.name }}</title>
  </head>
  <body>
    <h1>
      Directory <b>{{ directory.name }}</b> with {{ directory.item_amount }}
      amount of items
    </h1>
    <h2>Items</h2>
    {% for item in items %}
    <ul>
      <li>{{ item }}</li>
    </ul>
    {% endfor %}
  </body>
</html>
