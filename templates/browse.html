<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{{ directory.name }}</title>
  </head>
  <body>
    <p>
      <b>{{ directory.name }}</b>
    </p>
    <table>
      <th>No.</th>
      <th>Filename</th>
      <th>Filesize</th>
      <th>Filetype</th>
      {% set count = 0 %} {% for item in items %} {% set count = count + 1 %}
      <tr>
        <td>{{ count }}</td>
        <td>
          {% if item.isDirectory %}
          <!-- make current_diretory cleaner for accessing directories-->
          <a
            href="{{request.url_for('browse', current_directory=directory.name + '/' + item.filename)}}"
            >{{ item.filename }}</a
          >{% else %} {{ item.filename }} {% endif %}
        </td>
        <td>{{ item.filesize }}</td>
        <td>{{ item.filetype }}</td>
      </tr>
      {% endfor %}
    </table>
  </body>
</html>
